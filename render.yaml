databases:
  - name: reel-db
    databaseName: reel_automation
    user: reel_user
    plan: basic-256mb
    region: singapore

services:
  # Combined Backend + Frontend
  - type: web
    name: reel-studio
    runtime: python
    region: singapore
    plan: starter
    buildCommand: |
      pip install -r requirements.txt &&
      cd frontend && npm install && npm run build
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
      - key: CLAUDE_API_KEY
        sync: false
      - key: RUNWARE_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: reel-db
          property: connectionString
